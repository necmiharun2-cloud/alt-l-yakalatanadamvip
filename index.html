<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Liste Hurda Piyasası Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .category-box { background-color: #111827; border: 1px solid #1f2937; border-radius: 4px; overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        .category-header { background-color: #10b981; color: #fff; padding: 10px; font-weight: 900; text-transform: uppercase; font-size: 13px; text-align: center; letter-spacing: 1px; border-bottom: 2px solid rgba(0,0,0,0.1); }
        .price-table { width: 100%; border-collapse: collapse; flex-grow: 1; }
        .price-row { border-bottom: 1px solid #1f2937; transition: all 0.2s; }
        .price-row:hover { background-color: #1f2937; }
        .name-cell { padding: 12px 10px; font-size: 12px; font-weight: 600; color: #94a3b8; width: 65%; line-height: 1.2; }
        .price-cell { padding: 12px 10px; text-align: right; font-size: 14px; font-weight: 800; color: #fff; width: 35%; }
        .makul { display: block; font-size: 10px; color: #10b981; font-weight: 800; margin-top: 3px; }
        .header-main { background: linear-gradient(90deg, #000 0%, #111827 100%); border-bottom: 4px solid #10b981; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2); }
        /* Scrollbar güzelleştirme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <header class="header-main mb-8 p-6 flex flex-col md:flex-row justify-between items-center rounded-xl">
        <div class="flex items-center gap-4">
            <div class="h-14 w-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-white italic tracking-tighter">HURDA <span class="text-emerald-500">MERKEZİ</span></h1>
                <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">15 Kategori • Canlı Piyasa Verileri • Makul Oran Analizi</p>
            </div>
        </div>
        <div class="mt-4 md:mt-0 bg-black/40 p-4 rounded-lg border border-slate-800 text-right">
            <div id="clock" class="text-3xl font-mono text-emerald-500 font-black tracking-widest">12:20:00</div>
            <div class="text-[11px] text-slate-500 font-bold uppercase mt-1">21 NİSAN 2026 SALI</div>
        </div>
    </header>

    <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5">
        </div>

    <footer class="mt-12 p-6 text-center border-t border-slate-800 text-slate-500 text-xs font-medium">
        Bu paneldeki "Makul Oranlar" piyasa ortalamasından %12 düşülerek (Lojistik/İşçilik/Kâr) hesaplanmıştır. 
        <br>Anlık veriler saatlik olarak güncellenmektedir.
    </footer>

    <script>
        const scrapData = [
            { t: "Bakır Hurdası", i: [{ n: "Soyulmuş Bakır", p: 552.15 }, { n: "Lama Bakır İmalat", p: 522.34 }, { n: "Boru Bakır", p: 510.24 }, { n: "Yanık Bakır", p: 500.84 }, { n: "Soyma Bakır Fiyatı", p: 532.64 }, { n: "Hurda Bakırlı Petek", p: 228.24 }] },
            { t: "Sarı (Pirinç)", i: [{ n: "Sarı Hurda Araiş", p: 342.24 }, { n: "Musluk Hurdası", p: 320.34 }, { n: "Pirinç Araiş", p: 350.04 }, { n: "Batarya Vana Su Saati", p: 290.11 }, { n: "Sarı Talaşı", p: 350.17 }, { n: "Ms 58 - 64 - 70", p: 390.32 }] },
            { t: "Demir Grubu", i: [{ n: "DKP Demir", p: 12.20 }, { n: "Ekstra Demir", p: 11.17 }, { n: "Toplama Demir", p: 10.54 }, { n: "Mahalle Hurdası", p: 10.51 }, { n: "1. Grup Demir", p: 11.23 }, { n: "Teneke Hurdası", p: 3.05 }] },
            { t: "Kablo Çeşitleri", i: [{ n: "Soyulmamış Kablo", p: 358.11 }, { n: "Ttr Hurda Kablo", p: 350.00 }, { n: "Nya Kablo Hurda", p: 470.10 }, { n: "Tekdamar Kalın", p: 510.00 }, { n: "Karışık Bakır Kablo", p: 350.82 }] },
            { t: "Alüminyum", i: [{ n: "Hurda Alüminyum", p: 99.11 }, { n: "Ofset Matbaa Kalıbı", p: 85.50 }, { n: "Profil Alüminyum", p: 99.10 }, { n: "Alüminyum Talaş", p: 68.18 }, { n: "Jant Alüminyum", p: 95.19 }] },
            { t: "Krom (Paslanmaz)", i: [{ n: "304 Paslanmaz Krom", p: 48.16 }, { n: "316 Paslanmaz Krom", p: 80.50 }, { n: "Paslanmaz Çelik", p: 47.11 }, { n: "Krom Talaşı", p: 46.18 }, { n: "Karışık Krom", p: 48.19 }] },
            { t: "Akü Hurdası", i: [{ n: "Kuru Akü", p: 28.11 }, { n: "Jel Akü", p: 28.47 }, { n: "Sulu Akü", p: 28.50 }, { n: "Büyük Amper Akü", p: 29.50 }, { n: "Küçük Akü", p: 27.20 }] },
            { t: "Kurşun Grubu", i: [{ n: "Levha Kurşun", p: 95.01 }, { n: "Çatı Sökümü Kurşun", p: 92.50 }, { n: "Külçe Kurşun", p: 75.50 }, { n: "Boru Kurşun", p: 70.00 }, { n: "Karışık Kurşun", p: 73.15 }] },
            { t: "Çinko Hurdası", i: [{ n: "Levha Çıkma Çinko", p: 90.11 }, { n: "Karışık Çinko", p: 70.30 }, { n: "Çatı Minare Sökümü", p: 70.26 }, { n: "Külçe Çinko", p: 70.50 }, { n: "Zamak Hurdası", p: 82.00 }] },
            { t: "Kağıt & Karton", i: [{ n: "Karton Hurdası", p: 6.60 }, { n: "A4 Beyaz Kağıt", p: 7.50 }, { n: "Kitap / Dergi", p: 6.20 }, { n: "Gazete Hurdası", p: 5.80 }, { n: "Arşiv Kağıdı", p: 7.10 }] },
            { t: "Plastik Hurdası", i: [{ n: "Pimapen Hurdası", p: 18.00 }, { n: "Naylon Hurdası", p: 14.50 }, { n: "Pvc Boru Hurdası", p: 8.50 }, { n: "Plastik Kasa", p: 9.00 }, { n: "Şeffaf Naylon", p: 15.50 }] },
            { t: "Motor & Kompresör", i: [{ n: "Buzdolabı Motoru", p: 25.00 }, { n: "Elektrik Motoru", p: 32.50 }, { n: "Klima Kompresörü", p: 28.00 }, { n: "Büyük Sanayi Motor", p: 38.00 }, { n: "Çamaşır Mak. Motor", p: 22.00 }] },
            { t: "Petekler & Radyatör", i: [{ n: "Bakırlı Petek", p: 285.00 }, { n: "Alüminyum Petek", p: 65.00 }, { n: "Klima Radyatörü", p: 110.00 }, { n: "Oto Radyatör", p: 95.00 }, { n: "Demir Radyatör", p: 7.50 }] },
            { t: "Şantiye & Yıkım", i: [{ n: "Şantiye Hurdası", p: 14.50 }, { n: "İnşaat Demiri", p: 13.80 }, { n: "Çelik Halat", p: 10.00 }, { n: "Sandviç Panel", p: 15.50 }, { n: "Konteyner Hurdası", p: 11.50 }] },
            { t: "Özel Hurdalar", i: [{ n: "Matbaa Kalıbı", p: 135.00 }, { n: "X-Ray Film", p: 450.00 }, { n: "Elektronik Kart", p: 85.00 }, { n: "Bilgisayar Hurdası", p: 120.00 }, { n: "Nikel Hurdası", p: 410.00 }] }
        ];

        function render() {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = '';
            scrapData.forEach(cat => {
                let rows = '';
                cat.i.forEach(item => {
                    const m = (item.p * 0.88).toFixed(2);
                    rows += `
                        <tr class="price-row">
                            <td class="name-cell">${item.n}<span class="makul">Alım Oranı: ₺${m}</span></td>
                            <td class="price-cell">${item.p.toFixed(2)} <span class="text-[9px] text-emerald-500 font-bold ml-1 italic">TL</span></td>
                        </tr>
                    `;
                });
                grid.innerHTML += `
                    <div class="category-box shadow-2xl">
                        <div class="category-header">${cat.t}</div>
                        <table class="price-table">
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
        }, 1000);

        render();
    </script>
</body>
</html>
